name: Dev - Continuous Build and Deploy

# Fires on every push to main. Only the service(s) actually touched are
# built and deployed — this workflow is capable of building any of the
# three microservices, matrix-driven from the change-detection step below.
# This pipeline is independent of release versioning: it exists purely to
# give fast feedback on ordinary development changes.

on:
  push:
    branches: [main]
    paths:
      - "components/**"

permissions:
  contents: write
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v7

      - name: Determine which services changed
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            enrollment: 'components/enrollment/**'
            filemanagement: 'components/filemanagement/**'
            reporting: 'components/reporting/**'

  build-and-deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history — the dev build number is a commit count

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute dev build tag
        id: tag
        run: |
          # Per-service build number = commits that ever touched this service's
          # folder. Stateless (derived from git), monotonic, and only advances
          # when THIS service changes. 0.0. signals "no release version yet" —
          # a real x.y.z is assigned for the first time at the release cut.
          COUNT="$(git rev-list --count ${{ github.sha }} -- "components/${{ matrix.service }}")"
          SHORT="$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "value=dev-0.0.$COUNT-$SHORT" >> "$GITHUB_OUTPUT"
          echo "Dev tag for ${{ matrix.service }}: dev-0.0.$COUNT-$SHORT"

      - name: Build and push dev image
        uses: docker/build-push-action@v7
        with:
          context: components/${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ steps.tag.outputs.value }}

      - name: Deploy to dev (simulated)
        run: |
          echo "Simulating deployment of ${{ matrix.service }}:${{ steps.tag.outputs.value }} to the dev environment."
          echo "No real infrastructure is targeted by this demo pipeline."

  update-manifest:
    needs: [detect-changes, build-and-deploy]
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0   # full history — recompute the same commit-count tag

      - name: Install manifest tooling
        run: pip install --quiet pyyaml

      - name: Update manifests/dev.yaml for each changed service
        run: |
          # Same deterministic formula as the build job (service + github.sha),
          # so the manifest records the identical tag that was pushed.
          SHORT="$(echo '${{ github.sha }}' | cut -c1-7)"
          for svc in $(echo '${{ needs.detect-changes.outputs.services }}' | python3 -c "import json,sys; print(' '.join(json.load(sys.stdin)))"); do
            COUNT="$(git rev-list --count ${{ github.sha }} -- "components/$svc")"
            python3 scripts/update_manifest.py dev "$svc" "dev-0.0.$COUNT-$SHORT"
          done

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/dev.yaml
          git commit -m "chore(dev): update manifest for ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
