name: Release Cut

# Manually triggered. Cuts one generic release/x.y.z branch across the
# whole repository and assigns every microservice the same version number.
# Only services whose source under components/<svc> changed since the last
# release are rebuilt; unchanged services are retag-forward — their existing
# signed image (from the previous release version) is relabeled with the new
# version, reusing the same digest, never rebuilt. A single v<x.y.z> git tag
# marks each cut and is the diff anchor the next cut measures against. This
# is the only place a release version is assigned; every later promotion
# only ever relabels what is built here.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version for this cut, e.g. 1.0.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  cut-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Create the release branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git branch "release/${{ inputs.version }}"
          git push origin "release/${{ inputs.version }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine previous release (diff anchor for change detection)
        id: prev
        run: |
          # The newest existing v* tag is the previous release. The new tag
          # for THIS cut is not created until after the build below, so this
          # never diffs a cut against itself.
          PREV_TAG="$(git tag -l 'v*' --sort=-v:refname | head -1)"
          echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$PREV_TAG" ]; then
            echo "Previous release tag: $PREV_TAG"
          else
            echo "No previous release tag — first cut; every service builds fresh."
          fi

      - name: Build changed services fresh; retag-forward unchanged ones
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          PREV_TAG="${{ steps.prev.outputs.tag }}"
          PREV_VERSION="${PREV_TAG#v}"   # strip leading v -> image version label

          for svc in enrollment filemanagement reporting; do
            NEW="$REPO/$svc:${{ inputs.version }}"

            if [ -n "$PREV_TAG" ] && git diff --quiet "$PREV_TAG" HEAD -- "components/$svc"; then
              # Unchanged since the last release: reuse the existing signed
              # image. A retag keeps the same digest, so the cosign signature
              # made at its original build stays valid.
              SRC="$REPO/$svc:$PREV_VERSION"
              echo "$svc unchanged since $PREV_TAG — retag-forward $SRC -> $NEW (no rebuild)"
              docker pull "$SRC"
              docker tag "$SRC" "$NEW"
              docker push "$NEW"
            else
              # Changed (or first cut ever): build fresh and sign.
              echo "Building $svc fresh for release ${{ inputs.version }}"
              docker build -t "$NEW" "components/$svc"

              echo "Simulating cosign signature for $svc:${{ inputs.version }}"
              echo "  (a real pipeline signs the digest here with Sigstore/cosign before it is ever pushed)"

              docker push "$NEW"
            fi
          done

      - name: Tag this cut (single anchor for the next release's diff)
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Deploy release build to dev as a final sanity check (simulated)
        run: |
          for svc in enrollment filemanagement reporting; do
            echo "Simulating sanity-check deployment of $svc:${{ inputs.version }} to dev."
          done

      - name: Install manifest tooling
        run: pip install --quiet pyyaml

      - name: Record this release in the dev manifest
        run: |
          for svc in enrollment filemanagement reporting; do
            python3 scripts/update_manifest.py dev "$svc" "${{ inputs.version }}"
          done

      - name: Commit manifest update to main
        run: |
          git add manifests/dev.yaml
          git commit -m "chore(release): cut ${{ inputs.version }} — all services sanity-checked in dev"
          git push origin HEAD:main
