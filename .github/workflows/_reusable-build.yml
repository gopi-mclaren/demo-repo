name: _reusable-build

# Shared build logic. Called by dev.yml (per changed service) and by
# release-cut.yml (for every service in the release). This is the only
# workflow in the repository that runs a docker build — every other
# workflow only ever relabels an image this one already produced.

on:
  workflow_call:
    inputs:
      service:
        description: "Service folder under components/ to build"
        required: true
        type: string
      tag:
        description: "Tag to apply to the built image"
        required: true
        type: string
    outputs:
      image:
        description: "Fully qualified image reference that was pushed"
        value: ${{ jobs.build.outputs.image }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set-output.outputs.image }}
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: components/${{ inputs.service }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ inputs.service }}:${{ inputs.tag }}

      - name: Record image reference
        id: set-output
        run: |
          echo "image=ghcr.io/${{ github.repository }}/${{ inputs.service }}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
